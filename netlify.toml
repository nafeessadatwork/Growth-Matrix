# Netlify configuration — https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Single-page app: serve index.html for unknown paths (direct links, refresh)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
